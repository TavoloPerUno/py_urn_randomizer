# Example configuration file for use with urn-randomization package
# To use, rename to config.yaml and edit as necessary

# Database connection string
# db: sqlite:///urn-randomization.db

# Default urn parameters (can be overridden per study)
# w: 1          # Initial number of balls per treatment
# alpha: 0      # Balls added for assigned treatment after each draw
# beta: 1       # Balls added for unassigned treatments after each draw
# D: chisquare  # Imbalance measure: range, variance, or chisquare
# urn_selection: method1  # Method 1: p=1 for urn with largest D

# A short string identifying the study
"Example Study":

    starting_seed: 100
    treatments:
        - Treatment A
        - Treatment B

    factors:
        site:
            ["Site 1", "Site 2", "Site 3"]
        age_group:
            ["18-40", "41-65", "65+"]
        sex:
            ["Male", "Female"]
        disease_severity:
            ["Mild", "Moderate", "Severe"]
