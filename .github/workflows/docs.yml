name: Deploy Docs

on:
  push:
    branches: [master]

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install sphinx sphinx-rtd-theme sphinxcontrib-httpdomain sphinx-click sphinx-autoapi rinohtype

      - name: Build Sphinx docs
        env:
          URAND_CONFIG_FILE: config-sample.yaml
          URAND_STUDY_NAME: "Example Study"
        run: sphinx-build sphinx-config/ _build/html

      - name: Add .nojekyll
        run: touch _build/html/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
