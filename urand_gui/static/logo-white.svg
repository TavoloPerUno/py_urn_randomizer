<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Urn body - classical vase shape -->
  <path d="M180 360 Q180 400 200 420 L312 420 Q332 400 332 360 L340 280 Q342 240 320 220 L310 210 Q340 190 340 160 L340 150 Q340 130 320 130 L192 130 Q172 130 172 150 L172 160 Q172 190 202 210 L192 220 Q170 240 172 280 Z"
        fill="none" stroke="#ffffff" stroke-width="10" stroke-linejoin="round"/>

  <!-- Urn rim -->
  <rect x="170" y="120" width="172" height="16" rx="4" fill="#ffffff"/>

  <!-- Urn base -->
  <rect x="200" y="420" width="112" height="12" rx="4" fill="#ffffff"/>
  <rect x="216" y="432" width="80" height="10" rx="3" fill="#ffffff"/>

  <!-- Colored balls inside the urn -->
  <circle cx="230" cy="340" r="22" fill="#7EBEC5"/>
  <circle cx="282" cy="340" r="22" fill="#fcb900"/>
  <circle cx="256" cy="300" r="22" fill="#7EBEC5"/>
  <circle cx="220" cy="290" r="18" fill="#fcb900" opacity="0.85"/>
  <circle cx="290" cy="295" r="18" fill="#ffffff" opacity="0.5"/>

  <!-- Ball being drawn out (above urn) -->
  <circle cx="256" cy="70" r="18" fill="#7EBEC5"/>

  <!-- Dashed line -->
  <path d="M256 95 L256 118" stroke="#ffffff" stroke-width="3" stroke-dasharray="4,3"/>

  <!-- Shine -->
  <circle cx="224" cy="333" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="276" cy="333" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="250" cy="293" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="250" cy="63" r="4" fill="#ffffff" opacity="0.3"/>
</svg>
